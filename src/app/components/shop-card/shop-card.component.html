<a class="shop-card" [routerLink]="['/shop', shop.id]">
  <div class="card-header">
    <div class="shop-info">
      <span class="shop-name">{{ shop.name }}</span>
      <span class="owner-name">{{ shop.owner_name }}</span>
    </div>
    <span class="status-pill" [ngClass]="statusClass">{{ statusLabel }}</span>
  </div>

  <div class="card-metrics" *ngIf="summary; else noActivity">
    <div class="metric">
      <span class="label">Sales</span>
      <span class="value">₦{{ summary.total_sales | number:'1.0-0' }}</span>
    </div>
    <div class="metric">
      <span class="label">Profit</span>
      <span class="value profit">₦{{ summary.total_profit | number:'1.0-0' }}</span>
    </div>
    <div class="metric">
      <span class="label">Credit</span>
      <span class="value credit">₦{{ summary.total_credit_given | number:'1.0-0' }}</span>
    </div>
  </div>

  <ng-template #noActivity>
    <p class="no-activity">No transactions today yet</p>
  </ng-template>

  <div class="card-footer">
    <span class="business-type">{{ shop.business_type }}</span>
    <span class="view-link">View details →</span>
  </div>
</a>
