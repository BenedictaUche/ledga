<div class="dashboard">
  <header class="header">
    <div class="header-left">
      <h1 class="logo">Ledga</h1>
      <span class="tagline">Operator Dashboard</span>
    </div>
    <div class="header-right">
      <span class="operator-badge">Demo Operator</span>
    </div>
  </header>

  <div class="content" *ngIf="!loading; else loadingTpl">

    <!-- Summary metrics -->
    <div class="metrics">
      <div class="metric-card">
        <span class="metric-label">Today's profit</span>
        <span class="metric-value profit">₦{{ totalProfitToday | number:'1.0-0' }}</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Active shops</span>
        <span class="metric-value">{{ activeShops }}</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Pending exceptions</span>
        <span class="metric-value" [class.danger]="totalExceptions > 0">{{ totalExceptions }}</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Total shops</span>
        <span class="metric-value">{{ shops.length }}</span>
      </div>
    </div>

    <!-- Exception inbox -->
    <section *ngIf="exceptions.length > 0" class="section">
      <h2 class="section-title">
        Exceptions
        <span class="badge danger">{{ exceptions.length }}</span>
      </h2>
      <app-exception-inbox
        [exceptions]="exceptions"
        [operatorId]="operatorId"
        (resolved)="onExceptionResolved()">
      </app-exception-inbox>
    </section>

    <!-- Shops -->
    <section class="section">
      <h2 class="section-title">Shops</h2>
      <div class="shops-grid">
        <app-shop-card
          *ngFor="let shop of shops"
          [shop]="shop"
          [summary]="shopSummaries[shop.id]">
        </app-shop-card>
      </div>
    </section>

  </div>

  <ng-template #loadingTpl>
    <div class="loading">Loading...</div>
  </ng-template>
</div>
